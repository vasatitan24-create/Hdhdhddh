name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Загрузка вашего кода
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Установка Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 3. Автоматическая установка Gradle 8.2 на сервер GitHub
    # (так как в репозитории нет файла запуска gradlew)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    # 4. Сборка APK с помощью установленного Gradle (запускается через команду gradle, а не ./gradlew)
    - name: Build Debug APK
      run: gradle assembleDebug

    # 5. Сохранение готового файла APK в артефакты сборки
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: neiro-bitva-app
        path: app/build/outputs/apk/debug/app-debug.apk
